# Build the FROST RV32 no-MMU M-mode Linux kernel + initramfs with Buildroot
# (via the linux/buildroot-external BR2_EXTERNAL tree), package it into the
# FROST sim memory images, and run the cocotb `linux_boot` simulation.
#
# Prerequisites (one-time, not done by this workflow):
#   git submodule add https://github.com/buildroot/buildroot.git linux/buildroot
#   git -C linux/buildroot checkout 2026.05   # see README pin caveat
#
# This is a DRAFT. TODOs mark the spots that need real runner details.
name: Linux Boot Sim

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "linux/buildroot-external/**"
      - ".github/workflows/linux-boot-sim.yml"

env:
  # The kernel build inputs were captured from buildroot 2026.08-git (67449130).
  # 2026.05 is the requested tag; verify it has gcc 15.2.0 / binutils 2.45.1 /
  # linux-6.18 headers (README pin caveat) or change this to the commit SHA.
  BUILDROOT_REF: "2026.05"
  # Out-of-tree Buildroot build dir + a stable download cache dir.
  BR2_OUT: "linux/build"
  BR2_DL_DIR: "linux/dl"

jobs:
  # ---------------------------------------------------------------------------
  # Build the kernel + initramfs and package the FROST sim memory images.
  # ---------------------------------------------------------------------------
  build-kernel:
    name: Build FROST Linux (Buildroot)
    runs-on: ubuntu-24.04
    # First build compiles the cross toolchain from source (~30-60 min). With
    # the dl/ + ccache caches warm, subsequent runs are ~10-20 min.
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Recursive so the pinned linux/buildroot submodule is fetched.
          submodules: recursive

      # TODO: if the Buildroot submodule is not yet committed, add it here:
      #   - run: |
      #       git submodule add https://github.com/buildroot/buildroot.git linux/buildroot || true
      #       git -C linux/buildroot fetch --depth 1 origin ${{ env.BUILDROOT_REF }}
      #       git -C linux/buildroot checkout FETCH_HEAD

      - name: Install Buildroot host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make file cpio unzip rsync bc wget \
            python3 git ccache flex bison libssl-dev libelf-dev \
            libncurses-dev device-tree-compiler

      - name: Cache Buildroot downloads (source tarballs)
        uses: actions/cache@v4
        with:
          path: ${{ env.BR2_DL_DIR }}
          # dl/ only changes when a package version (kernel/toolchain) changes.
          key: br2-dl-${{ env.BUILDROOT_REF }}-${{ hashFiles('linux/buildroot-external/configs/frost_nommu_rv32_defconfig', 'linux/buildroot-external/board/frost/**') }}
          restore-keys: |
            br2-dl-${{ env.BUILDROOT_REF }}-

      - name: Cache ccache (toolchain + kernel object cache)
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: br2-ccache-${{ env.BUILDROOT_REF }}-${{ github.sha }}
          restore-keys: |
            br2-ccache-${{ env.BUILDROOT_REF }}-

      - name: Configure (frost_nommu_rv32_defconfig)
        run: |
          make -C linux/buildroot O="${{ github.workspace }}/${{ env.BR2_OUT }}" \
            BR2_EXTERNAL="${{ github.workspace }}/linux/buildroot-external" \
            BR2_DL_DIR="${{ github.workspace }}/${{ env.BR2_DL_DIR }}" \
            frost_nommu_rv32_defconfig
          # Enable ccache for CI only (kept out of the committed defconfig).
          echo 'BR2_CCACHE=y' >> "${{ github.workspace }}/${{ env.BR2_OUT }}/.config"
          make -C linux/buildroot O="${{ github.workspace }}/${{ env.BR2_OUT }}" olddefconfig

      - name: Build kernel + initramfs + FROST memory images
        run: |
          make -C linux/buildroot O="${{ github.workspace }}/${{ env.BR2_OUT }}" \
            BR2_DL_DIR="${{ github.workspace }}/${{ env.BR2_DL_DIR }}"

      - name: Stage memory images for the cocotb linux_boot test
        run: |
          mkdir -p sw/apps/linux_boot
          cp "${{ env.BR2_OUT }}/images/sw.mem"     sw/apps/linux_boot/sw.mem
          cp "${{ env.BR2_OUT }}/images/sw_ddr.mem" sw/apps/linux_boot/sw_ddr.mem
          ls -l "${{ env.BR2_OUT }}/images/"

      - name: Upload FROST boot images
        uses: actions/upload-artifact@v4
        with:
          name: frost-linux-boot-images
          path: |
            ${{ env.BR2_OUT }}/images/Image
            ${{ env.BR2_OUT }}/images/rootfs.cpio.gz
            ${{ env.BR2_OUT }}/images/frost-nommu-fpga.dtb
            ${{ env.BR2_OUT }}/images/sw.mem
            ${{ env.BR2_OUT }}/images/sw_ddr.mem
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Run the cocotb linux_boot simulation against the packaged images.
  # Reuses the same Dockerized toolchain as ci.yml (Verilator + cocotb).
  # ---------------------------------------------------------------------------
  linux-boot-sim:
    name: Cocotb linux_boot (Verilator)
    runs-on: ubuntu-24.04
    needs: build-kernel
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download FROST boot images
        uses: actions/download-artifact@v4
        with:
          name: frost-linux-boot-images
          path: /tmp/frost-images

      - name: Stage images into sw/apps/linux_boot
        run: |
          mkdir -p sw/apps/linux_boot
          cp /tmp/frost-images/sw.mem     sw/apps/linux_boot/sw.mem
          cp /tmp/frost-images/sw_ddr.mem sw/apps/linux_boot/sw_ddr.mem

      # Build the frost-dev image (same Dockerfile/pattern as ci.yml). To avoid
      # rebuilding it here, this could instead reuse ci.yml's uploaded
      # frost-docker-image artifact.  TODO: share the image across workflows.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frost-dev Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: frost-dev:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: the `linux_boot` TEST_REGISTRY entry / cocotb harness lives on the
      # FROST Linux feature branch, not on main. Once it lands, this runs the
      # boot sim against the staged sw_ddr.mem. It is a long-running sim, so
      # cap it with the pytest/cocotb timeout the harness defines.
      - name: Run cocotb linux_boot simulation
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pytest tests/test_run_cocotb.py -m cocotb -k linux_boot -v

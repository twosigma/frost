name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Tool versions - single source of truth (also in Dockerfile)
  VERILATOR_VERSION: "5.046"
  YOSYS_VERSION: "0.64"
  SBY_VERSION: "0.63"

jobs:
  # Build the Docker image (shared by all jobs)
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: frost-dev:latest
          build-args: |
            VERILATOR_VERSION=${{ env.VERILATOR_VERSION }}
            YOSYS_VERSION=${{ env.YOSYS_VERSION }}
            SBY_VERSION=${{ env.SBY_VERSION }}
          outputs: type=docker,dest=/tmp/frost-dev.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp/frost-dev.tar
          retention-days: 1

  # Run Cocotb tests with Verilator (excludes arch compliance, which has its own matrix job)
  test-verilator:
    name: Cocotb Tests (Verilator)
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run Cocotb tests with Verilator
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pytest tests/ -m cocotb -v \
              --ignore=tests/test_arch_compliance.py \
              --ignore=tests/test_riscv_tests.py \
              --ignore=tests/test_riscv_torture.py

  # Cocotb real programs in the DDR memory tier: the same programs as the bram
  # job above, but linked whole-program into the cached DDR region (exercises the
  # L1I fetch path + the D-side cached tier). Real programs only; unit benches are
  # tier-independent and run once in the bram job. FROST_COCOTB_MEM_CONFIG=ddr
  # flips every app to the ddr build; fuzz/ddr_* programs self-skip in this tier.
  test-verilator-ddr:
    name: Cocotb Real Programs (Verilator / ddr)
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run Cocotb real programs in the DDR tier
        run: |
          docker run --rm -e FROST_COCOTB_MEM_CONFIG=ddr -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pytest tests/test_run_cocotb.py -m cocotb -k test_real_program -v

  # RISC-V Architecture Compliance Tests - parallelized by extension x memory
  # tier. The two compliance tiers a program actually runs from:
  #   bram - code + data + signature in low BRAM (pure ISA conformance, the
  #          low tier programs use when they fit).
  #   ddr  - code + data + signature in cached DDR (also exercises the L1I
  #          fetch path and the D-side cached tier on every load/store).
  # A third diagnostic config, icache (code in DDR, data + signature in BRAM),
  # isolates the instruction-fetch path from the D-side cached tier; it is not
  # a compliance target, so it stays a local aid (--mem-config icache) rather
  # than a CI job.
  test-arch-compliance:
    name: Arch Tests (${{ matrix.extension }} / ${{ matrix.mem_config }})
    runs-on: ubuntu-24.04
    # Allows slow extension batches enough room beyond the per-test simulator timeout.
    timeout-minutes: 300
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        extension: [I, M, A, F, D, C, B, K, Zicond, Zifencei, privilege, F_Zcf, D_Zcd, hints]
        mem_config: [bram, ddr]
        # Fencei (Zifencei) exercises self-modifying code: store an instruction,
        # fence.i, then execute it. The low-BRAM tier is a Harvard split
        # (separate instruction and data BRAMs), so a store reaches only the
        # data BRAM and SMC is non-coherent there; fence.i's writeback +
        # invalidate apply to the cached DDR tier alone. Fencei is therefore a
        # DDR-tier-only compliance test.
        exclude:
          - extension: Zifencei
            mem_config: bram
          # F/D DDR arch-compliance batches are too slow for GitHub-hosted
          # Verilator CI. FPU conformance is still covered by F/D bram jobs;
          # DDR/cache behavior is covered by the other DDR test tiers.
          - extension: F
            mem_config: ddr
          - extension: D
            mem_config: ddr
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run arch compliance tests (${{ matrix.extension }} / ${{ matrix.mem_config }})
        run: |
          if [ -n "${{ matrix.test_path }}" ]; then
            docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
              python3 tests/test_arch_compliance.py --test ${{ matrix.test_path }} \
                --mem-config ${{ matrix.mem_config }}
          else
            docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
              python3 tests/test_arch_compliance.py --extensions ${{ matrix.extension }} \
                --mem-config ${{ matrix.mem_config }}
          fi

  # riscv-tests ISA Tests - parallelized by suite x memory tier
  test-riscv-tests:
    name: riscv-tests (${{ matrix.suite }} / ${{ matrix.mem_config }})
    runs-on: ubuntu-24.04
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        suite: [rv32ui, rv32um, rv32ua, rv32uf, rv32ud, rv32uc, rv32mi, rv32uzba, rv32uzbb, rv32uzbs, rv32uzbkb]
        mem_config: [bram, ddr]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run riscv-tests ISA suite (${{ matrix.suite }} / ${{ matrix.mem_config }})
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            python3 tests/test_riscv_tests.py --suites ${{ matrix.suite }} \
              --mem-config ${{ matrix.mem_config }}

  # riscv-tests Benchmarks - parallelized by benchmark x memory tier
  test-riscv-benchmarks:
    name: riscv-tests Benchmarks (${{ matrix.benchmark }} / ${{ matrix.mem_config }})
    runs-on: ubuntu-24.04
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        benchmark: [median, multiply, qsort, rsort, towers, vvadd, dhrystone, mm, spmv]
        mem_config: [bram, ddr]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run riscv-tests benchmark (${{ matrix.benchmark }} / ${{ matrix.mem_config }})
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            python3 tests/test_riscv_tests.py --benchmarks ${{ matrix.benchmark }} \
              --mem-config ${{ matrix.mem_config }}

  # riscv-torture Random Instruction Tests - parallelized by memory tier
  test-riscv-torture:
    name: riscv-torture Tests (${{ matrix.mem_config }})
    runs-on: ubuntu-24.04
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        mem_config: [bram, ddr]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run riscv-torture tests (${{ matrix.mem_config }})
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            python3 tests/test_riscv_torture.py --all --mem-config ${{ matrix.mem_config }}

  # Run Yosys synthesis check
  test-synthesis:
    name: Yosys Synthesis Check
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run synthesis tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pytest tests/ -m synthesis -v

  # Run SymbiYosys formal verification
  test-formal:
    name: Formal Verification
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run formal verification
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pytest tests/ -m formal -v

  # Run linting inside Docker to ensure version consistency with pre-commit
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Run pre-commit hooks
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace frost-dev:latest \
            pre-commit run --all-files

  # ---------------------------------------------------------------------------
  # FROST no-MMU M-mode Linux: build the image from source, then boot it two
  # ways off the SAME artifact -- on the FROST RTL in cocotb (the gremlin
  # regression) and under QEMU (a fast full boot-to-shell reference).
  # ---------------------------------------------------------------------------

  # Build the kernel + busybox initramfs + FROST memory images from the vendored
  # Buildroot submodule (linux/buildroot @ pinned SHA) driven by the FROST
  # BR2_EXTERNAL tree. Runs inside the frost-dev image, which ships Buildroot's
  # host deps + QEMU, so the host deps are single-sourced in the Dockerfile. The
  # first build compiles a full rv32 uClibc cross toolchain from source; the dl/
  # and ccache caches make later runs much faster.
  build-frost-linux:
    name: Build FROST Linux Image (Buildroot)
    runs-on: ubuntu-24.04
    needs: build-docker
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Recursive so the pinned linux/buildroot submodule is fetched.
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Cache Buildroot downloads (source tarballs)
        uses: actions/cache@v4
        with:
          path: linux/dl
          # dl/ only changes when a package version (kernel/toolchain) changes.
          key: br2-dl-${{ hashFiles('linux/buildroot-external/configs/frost_nommu_rv32_defconfig', 'linux/buildroot-external/board/frost/**') }}
          restore-keys: |
            br2-dl-

      - name: Cache Buildroot ccache (toolchain + kernel object cache)
        uses: actions/cache@v4
        with:
          path: linux/ccache
          key: br2-ccache-${{ github.sha }}
          restore-keys: |
            br2-ccache-

      - name: Build kernel + initramfs + FROST memory images
        run: |
          docker run --rm \
            -e BR2_DL_DIR=/workspace/linux/dl \
            -e BR2_CCACHE_DIR=/workspace/linux/ccache \
            -v ${{ github.workspace }}:/workspace frost-dev:latest \
            bash -c '
              set -euo pipefail
              make -C linux/buildroot O=/workspace/linux/build \
                BR2_EXTERNAL=/workspace/linux/buildroot-external \
                frost_nommu_rv32_defconfig
              # Enable ccache for CI only (kept out of the committed defconfig).
              echo "BR2_CCACHE=y" >> /workspace/linux/build/.config
              make -C linux/buildroot O=/workspace/linux/build olddefconfig
              make -C linux/buildroot O=/workspace/linux/build
              # Stage the memory images where the cocotb linux_boot test resolves
              # them (sw/apps/linux_boot/{sw,sw_ddr}.mem).
              mkdir -p sw/apps/linux_boot
              cp linux/build/images/sw.mem     sw/apps/linux_boot/sw.mem
              cp linux/build/images/sw_ddr.mem sw/apps/linux_boot/sw_ddr.mem
              ls -l linux/build/images/
            '

      - name: Upload FROST Linux boot images
        uses: actions/upload-artifact@v4
        with:
          name: frost-linux-boot-images
          path: |
            linux/build/images/Image
            linux/build/images/rootfs.cpio.gz
            linux/build/images/frost-nommu-fpga.dtb
            linux/build/images/sw.mem
            linux/build/images/sw_ddr.mem
          retention-days: 7
          if-no-files-found: error

  # Boot the freshly built image on the FROST RTL in cocotb, bounded to ~22M
  # cycles in the genesys2-faithful cache shape (128 KiB L1I, no L2). This is the
  # "gremlin" regression: that window is silent mem_init after devtmpfs (no deep
  # console marker), so the run captures the full boot (FROST_LINUX_RUN_FULL) and
  # check_linux_boot_regression.py then asserts boot health -- banner + devtmpfs,
  # no panic, the periodic CLINT timer tick serviced (mtimecmp re-armed, the
  # thing the gremlin hung), and forward progress (retire) all the way to the
  # cap. CACHED_HAS_L2=0 must be an env/make var (the test's own -GCACHED_HAS_L2=0
  # is otherwise overridden by the tests/Makefile default).
  linux-boot-cocotb:
    name: Cocotb Linux Boot (22M, genesys2 shape)
    runs-on: ubuntu-24.04
    needs: [build-docker, build-frost-linux]
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Download FROST Linux boot images
        uses: actions/download-artifact@v4
        with:
          name: frost-linux-boot-images
          path: /tmp/frost-linux-images

      - name: Stage boot images for the cocotb linux_boot test
        run: |
          mkdir -p sw/apps/linux_boot
          cp /tmp/frost-linux-images/sw.mem     sw/apps/linux_boot/sw.mem
          cp /tmp/frost-linux-images/sw_ddr.mem sw/apps/linux_boot/sw_ddr.mem

      - name: Run cocotb linux_boot (22M-cycle gremlin regression)
        run: |
          docker run --rm \
            -e CACHED_HAS_L2=0 \
            -e FROST_LINUX_RUN_FULL=1 \
            -e COCOTB_NUM_RUNS=1 \
            -e COCOTB_LINUX_MAX_CYCLES=22000000 \
            -e COCOTB_PROGRESS_INTERVAL=500000 \
            -v ${{ github.workspace }}:/workspace frost-dev:latest \
            bash -c '
              set -o pipefail
              cd tests && make clean
              # RUN_FULL capture always trips the cocotb never-match assertion by
              # design; the boot-health verdict comes from the checker below.
              ./test_run_cocotb.py linux_boot_128k 2>&1 \
                | tee /workspace/linux_boot_cocotb.log || true
              python3 check_linux_boot_regression.py /workspace/linux_boot_cocotb.log
            '

      - name: Upload cocotb boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-boot-cocotb-log
          path: linux_boot_cocotb.log
          if-no-files-found: ignore

  # Boot the SAME kernel + rootfs to a login prompt under QEMU: a fast (seconds)
  # full-userspace reference that the RTL boot is bounded well short of. Confirms
  # the built image itself reaches a shell, independent of the FROST core.
  linux-boot-qemu:
    name: QEMU Linux Boot to Shell
    runs-on: ubuntu-24.04
    needs: [build-docker, build-frost-linux]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: frost-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/frost-dev.tar

      - name: Download FROST Linux boot images
        uses: actions/download-artifact@v4
        with:
          name: frost-linux-boot-images
          path: /tmp/frost-linux-images

      - name: Boot to a shell under QEMU (assert login prompt)
        run: |
          docker run --rm -v /tmp/frost-linux-images:/img frost-dev:latest \
            bash -c '
              set -euo pipefail
              # QEMU sits at the login prompt forever, so time-box it and assert
              # the marker from the captured log (file redirect, never a pipe --
              # piping QEMUs stdout to grep deadlocks).
              timeout -k5 120 qemu-system-riscv32 -M virt -bios none \
                -kernel /img/Image \
                -append "earlycon=sbi console=ttyS0 rdinit=/sbin/init" \
                -initrd /img/rootfs.cpio.gz -nographic -cpu rv32,mmu=off \
                </dev/null >/tmp/qemu-boot.log 2>&1 || true
              echo "===== QEMU boot log (tail) ====="
              tail -n 20 /tmp/qemu-boot.log
              grep -q "buildroot login:" /tmp/qemu-boot.log
            '
